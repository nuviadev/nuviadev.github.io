<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NuviaDev - Desarrollo Web Profesional</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/utils.css">
    <link rel="icon" href="../assets/icons/favicon.ico" type="image/x-icon">
</head>
<body>
    <header class="site-header">
        <div class="container nav">
            <div class="nav__brand">
                <a href="/index.html" class="nav__logo" aria-label="NuviaDev Home">
                    <img src="../assets/icons/logo.svg" alt="NuviaDev Logo" style="height:32px;vertical-align:middle;transition:transform 0.3s;" onmouseover="this.style.transform='scale(1.15) rotate(-6deg)'" onmouseout="this.style.transform='none'">
                    <span style="margin-left:8px;font-weight:700;letter-spacing:-1px;">NuviaDev</span>
                </a>
            </div>
            <nav class="nav__menu" aria-label="Navegación principal">
                <a href="/index.html" aria-current="page">Inicio</a>
                <a href="/about.html">Quiénes Somos</a>
                <a href="/services.html">Servicios</a>
                <a href="/projects.html">Proyectos</a>
                <a href="/testimonials.html">Testimonios</a>
                <a href="/contact.html">Contacto</a>
            </nav>
            <button class="nav__toggle" aria-label="Abrir menú" onclick="document.querySelector('.nav__menu').classList.toggle('is-open')">
                <span class="nav__toggle-bar"></span>
                <span class="nav__toggle-bar"></span>
                <span class="nav__toggle-bar"></span>
            </button>
            <button class="dark-toggle" aria-label="Toggle modo oscuro" onclick="document.body.classList.toggle('dark-mode')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="12" cy="12" r="10" stroke="var(--brand)" stroke-width="2" fill="var(--surface)"/>
                  <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" fill="var(--brand)"/>
                </svg>
            </button>
        </div>
    </header>
</body>
</html>
