<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonios - NuviaDev</title>
    <meta name="description" content="Opiniones y testimonios de clientes satisfechos con NuviaDev.">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <!-- Header -->
    <!--#include file="../partials/header.html" -->
    <main>
        <section class="testimonials container" aria-labelledby="testimonials-title">
            <h1 id="testimonials-title">Testimonios</h1>
            <div class="testimonials-slider" id="slider">
                <div class="testimonial-card">
                    <img src="../assets/images/client1.jpg" alt="Cliente 1" class="testimonial-photo">
                    <p>“NuviaDev superó nuestras expectativas con una web rápida y moderna.”</p>
                    <div class="stars">★★★★★</div>
                    <cite>María G., CEO TechStartup</cite>
                </div>
                <div class="testimonial-card">
                    <img src="../assets/images/client2.jpg" alt="Cliente 2" class="testimonial-photo">
                    <p>“Atención excelente y resultados profesionales.”</p>
                    <div class="stars">★★★★★</div>
                    <cite>Carlos R., Director Marketing</cite>
                </div>
                <div class="testimonial-card">
                    <img src="../assets/images/client3.jpg" alt="Cliente 3" class="testimonial-photo">
                    <p>“Recomiendo NuviaDev para cualquier proyecto tech.”</p>
                    <div class="stars">★★★★★</div>
                    <cite>Laura S., CTO Fintech</cite>
                </div>
                <button class="testimonial-prev" aria-label="Anterior">&#8592;</button>
                <button class="testimonial-next" aria-label="Siguiente">&#8594;</button>
            </div>
        </section>
    </main>
    <!-- Footer -->
    <!--#include file="../partials/footer.html" -->
    <script>
    // Slider animado testimonios
    const slider = document.getElementById('slider');
    const cards = slider.querySelectorAll('.testimonial-card');
    let current = 0;
    function showCard(idx) {
        cards.forEach((c, i) => c.style.display = i === idx ? 'block' : 'none');
    }
    function next() {
        current = (current + 1) % cards.length;
        showCard(current);
    }
    function prev() {
        current = (current - 1 + cards.length) % cards.length;
        showCard(current);
    }
    slider.querySelector('.testimonial-next').onclick = next;
    slider.querySelector('.testimonial-prev').onclick = prev;
    showCard(current);
    setInterval(next, 5000);
    </script>
</body>
</html>
