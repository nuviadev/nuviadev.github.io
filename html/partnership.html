<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Programa de Partnership de NuviaDev - Colabora con nosotros">
    <title>Partnership - NuviaDev</title>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <!-- Header will be injected by /js/header-footer.js -->

    <main class="main-content">
        <section class="hero">
            <div class="hero__content">
                <h1 class="hero__title">Programa de Partnership</h1>
                <p class="hero__subtitle">Crece tu negocio colaborando con NuviaDev</p>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <h2 class="section__title">¿Listo para ser partner?</h2>
                <div class="apply-form glass-card">
                    <form class="form" action="/submit-partnership" method="POST">
                        <div class="form__group">
                            <label for="company">Nombre de la empresa</label>
                            <input type="text" id="company" name="company" required>
                        </div>
                        <div class="form__group">
                            <label for="email">Email de contacto</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form__group">
                            <label for="website">Sitio web</label>
                            <input type="url" id="website" name="website">
                        </div>
                        <div class="form__group">
                            <label for="message">¿Por qué quieres ser partner?</label>
                            <textarea id="message" name="message" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn btn--primary">Enviar solicitud</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer will be injected by /js/header-footer.js -->

    <script src="../js/main.js" type="module"></script>
    <script src="../js/animations.js" type="module"></script>
    <script src="../js/form.js" type="module"></script>
</body>
</html>
