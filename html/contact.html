<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - NuviaDev</title>
    <meta name="description" content="Ponte en contacto con NuviaDev para desarrollar tu presencia web.">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/utils.css">
    <link rel="icon" href="../assets/icons/favicon.ico" type="image/x-icon">
</head>
<body>
    <header>
        <!-- Include header.html here -->
    </header>
    <main>
        <section class="contact">
            <h1>Contacto</h1>
            <p>¿Tienes un proyecto en mente? ¡Nos encantaría saber de ti!</p>
            <form id="contact-form" action="/api/contact" method="POST">
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="name" required aria-required="true">
                
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required aria-required="true">
                
                <label for="message">Mensaje:</label>
                <textarea id="message" name="message" required aria-required="true"></textarea>
                
                <button type="submit">Enviar</button>
                <div id="form-message" aria-live="polite"></div>
            </form>
            <div class="contact-details">
                <h2>Detalles de Contacto</h2>
                <p>Email: <a href="mailto:info@nuvia.dev">info@nuvia.dev</a></p>
                <p>Teléfono: <a href="tel:+123456789">+123 456 789</a></p>
                <p>LinkedIn: <a href="https://www.linkedin.com/company/109993164/" target="_blank">NuviaDev en LinkedIn</a></p>
            </div>
            <div class="map-placeholder">
                <!-- Placeholder for map -->
                <p>Mapa aquí (placeholder)</p>
            </div>
        </section>
    </main>
    <footer>
        <!-- Include footer.html here -->
    </footer>
    <script src="../js/main.js"></script>
    <script src="../js/form-validate.js"></script>
</body>
</html>
