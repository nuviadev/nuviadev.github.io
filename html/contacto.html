<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contacta con NuviaDev - Agenda una demo de nuestros servicios">
    <title>Contacto - NuviaDev</title>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <!-- Header will be injected by /js/header-footer.js -->

    <main class="main-content">
        <section class="hero">
            <div class="hero__content">
                <h1 class="hero__title">Agenda una Demo</h1>
                <p class="hero__subtitle">Descubre cómo podemos ayudarte a alcanzar tus objetivos digitales</p>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="contact-grid">
                    <div class="contact-form glass-card">
                        <h2>Solicitar Demo</h2>
                        <form class="form" action="/submit-demo" method="POST" id="demo-form">
                            <div class="form__group">
                                <label for="name">Nombre completo</label>
                                <input type="text" id="name" name="name" required>
                            </div>
                            <div class="form__group">
                                <label for="company">Empresa</label>
                                <input type="text" id="company" name="company" required>
                            </div>
                            <div class="form__group">
                                <label for="email">Email profesional</label>
                                <input type="email" id="email" name="email" required>
                            </div>
                            <div class="form__group">
                                <label for="phone">Teléfono</label>
                                <input type="tel" id="phone" name="phone">
                            </div>
                            <div class="form__group">
                                <label for="service">Servicio de interés</label>
                                <select id="service" name="service" required>
                                    <option value="">Selecciona un servicio</option>
                                    <option value="web">Desarrollo Web</option>
                                    <option value="app">Aplicaciones</option>
                                    <option value="consulting">Consultoría</option>
                                </select>
                            </div>
                            <div class="form__group">
                                <label for="message">Mensaje</label>
                                <textarea id="message" name="message" rows="4"></textarea>
                            </div>
                            <button type="submit" class="btn btn--primary">Solicitar Demo</button>
                        </form>
                    </div>
                    <div class="contact-info">
                        <div class="glass-card">
                            <h3>Información de Contacto</h3>
                            <ul class="contact-list">
                                <li>
                                    <strong>Email:</strong>
                                    <a href="mailto:info@nuviadev.com">info@nuviadev.com</a>
                                </li>
                                <li>
                                    <strong>Teléfono:</strong>
                                    <a href="tel:+34900000000">+34 900 000 000</a>
                                </li>
                                <li>
                                    <strong>Horario:</strong>
                                    <p>Lunes a Viernes: 9:00 - 18:00</p>
                                </li>
                            </ul>
                        </div>
                        <div class="glass-card">
                            <h3>Oficina Principal</h3>
                            <p>Calle Tecnología, 123<br>
                               28100 Madrid<br>
                               España</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer will be injected by /js/header-footer.js -->

    <script src="../js/main.js" type="module"></script>
    <script src="../js/animations.js" type="module"></script>
    <script src="../js/form.js" type="module"></script>
</body>
</html>
