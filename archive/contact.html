<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - NuviaDev</title>
    <meta name="description" content="Ponte en contacto con NuviaDev para desarrollar tu presencia web.">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/utils.css">
    <link rel="icon" href="../assets/icons/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- Header will be injected by /js/header-footer.js -->
    <main>
        <section class="contact container" aria-labelledby="contact-title">
            <h1 id="contact-title">Contacto</h1>
            <p class="contact__subtitle">¿Tienes un proyecto en mente? ¡Nos encantaría saber de ti!</p>
            <form id="contact-form" autocomplete="off">
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="name" required aria-required="true" placeholder="Tu nombre">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required aria-required="true" placeholder="tu@email.com">
                <label for="message">Mensaje:</label>
                <textarea id="message" name="message" required aria-required="true" placeholder="Cuéntanos tu idea..."></textarea>
                <button type="submit" class="btn btn--primary">Enviar</button>
                <div id="form-message" aria-live="polite"></div>
            </form>
            <div class="contact-details">
                <h2>Detalles de Contacto</h2>
                <p>Email: <a href="mailto:info@nuvia.dev">info@nuvia.dev</a></p>
                <p>Teléfono: <a href="tel:+123456789">+123 456 789</a></p>
                <p>LinkedIn: <a href="https://www.linkedin.com/company/109993164/" target="_blank">NuviaDev en LinkedIn</a></p>
            </div>
            <div class="contact-map" style="margin-top:2rem;">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2992.0000000000005!2d-3.703790!3d40.416775!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd422997d1b1e1e1%3A0x1e1e1e1e1e1e1e1e!2sMadrid!5e0!3m2!1ses!2ses!4v1630000000000!5m2!1ses!2ses" width="100%" height="250" style="border:0;border-radius:8px;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <div class="cta" style="margin-top:2rem;">
                <h2>Let’s build something amazing!</h2>
            </div>
        </section>
    </main>
    <!-- Footer will be injected by /js/header-footer.js -->
    <script src="../js/main.js"></script>
    <script>
    // Validación JS y envío EmailJS
    document.getElementById('contact-form').onsubmit = async function(e) {
        e.preventDefault();
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const message = document.getElementById('message').value.trim();
        const msg = document.getElementById('form-message');
        if (!name || !email || !message) {
            msg.textContent = 'Por favor, completa todos los campos.';
            msg.style.color = 'var(--error)';
            return;
        }
        // EmailJS (requiere configuración)
        try {
            // emailjs.send('service_id','template_id',{name,email,message});
            msg.textContent = '¡Mensaje enviado correctamente!';
            msg.style.color = 'var(--brand)';
            document.getElementById('contact-form').reset();
        } catch {
            msg.textContent = 'Error al enviar. Intenta de nuevo.';
            msg.style.color = 'var(--error)';
        }
    };
    </script>
</body>
</html>
